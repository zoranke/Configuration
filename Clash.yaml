# 混合端口 (HTTP & SOCKS5)
mixed-port: 7890
# 允许局域网连接
allow-lan: true
# 运行模式: Rule (规则模式), Global (全局模式), Direct (直连模式)
mode: Rule
# 日志级别: info, warning, error, debug, silent
log-level: info
# 外部控制端口 (用于 Web 面板)
external-controller: 127.0.0.1:9090
# 统一延迟 (对所有节点进行测速时使用统一的延迟计算方法)
unified-delay: true
# 实验性功能
experimental:
  # 忽略解析失败的域名
  ignore-resolve-fail: true
# Clash for Windows 延迟超时 (毫秒)
cfw-latency-timeout: 8000
# Clash for Windows 延迟测试地址
cfw-latency-url: http://www.gstatic.com/generate_204
# Clash for Windows 连接打断策略
cfw-conn-break-strategy: true
# 自定义域名解析 (本地映射)
hosts: {}

# DNS 配置
dns:
  # 是否启用系统外部 DNS
  enable: true
  # 监听地址
  listen: 127.0.0.1:1053
  # 是否开启 IPv6 解析
  ipv6: true
  # 默认 DNS 服务器 (用于解析 DNS 服务的域名)
  default-nameserver:
    - 114.114.114.114
    - 223.5.5.5
    - 119.29.29.29
  # 假 IP 模式地址范围
  fake-ip-range: 28.0.0.1/8
  # 是否使用系统 hosts
  use-hosts: true
  # 增强模式: fake-ip (假 IP) 或 redir-host
  enhanced-mode: fake-ip
  # 假 IP 过滤列表
  fake-ip-filter:
    - "*.lan"
    - "*.localdomain"
    - "*.example"
    - "*.invalid"
    - "*.localhost"
    - "*.test"
    - "*.local"
