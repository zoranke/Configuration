# URL 重写(Stash)
url-rewrite:
  - ^https?:\/\/(www.)?(g|google)\.cn https://www.google.com 302
  - ^https?:\/\/(ditu|maps).google\.cn https://maps.google.com 302

# 代理节点
proxies: []

# 代理组配置
proxy-groups:
  # 🚀 节点选择: 手动选择节点或策略
  - name: 🚀 节点选择
    type: select
    proxies:
      - DIRECT
      - ♻️ 自动选择
      - 🚀 手动切换
      - 🇭🇰 Hong Kong
      - 🇯🇵 Japan
      - 🇺🇸 United States
      - 🇸🇬 Singapore
      - 🇹🇼 Taiwan
      - 🇰🇷 Korea
      - 🇬🇧 United Kingdom
      - 🇩🇪 Germany
      - 🇫🇷 France
      - 🌍 Other Regions

  # 🚀 手动切换: 具体节点的列表
  - name: 🚀 手动切换
    type: select
    proxies:
      - DIRECT
    use:
      - all-proxies

  # ♻️ 自动选择: 根据延迟自动选择最优节点
  - name: ♻️ 自动选择
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    use:
      - all-proxies

  # 🇭🇰 Hong Kong: 自动筛选香港地区的节点
  - name: 🇭🇰 Hong Kong
    type: select
    use:
      - all-proxies
    filter: "(?i)港|HK|Hong Kong"

  # 🇯🇵 Japan: 自动筛选日本地区的节点
  - name: 🇯🇵 Japan
    type: select
    use:
      - all-proxies
    filter: "(?i)日|JP|Japan"

  # 🇺🇸 United States: 自动筛选美国地区的节点
  - name: 🇺🇸 United States
    type: select
    use:
      - all-proxies
    filter: "(?i)美|US|United States"

  # 🇸🇬 Singapore: 自动筛选新加坡地区的节点
  - name: 🇸🇬 Singapore
    type: select
    use:
      - all-proxies
    filter: "(?i)新|SG|Singapore"

  # 🇹🇼 Taiwan: 自动筛选台湾地区的节点
  - name: 🇹🇼 Taiwan
    type: select
    use:
      - all-proxies
    filter: "(?i)台|TW|Taiwan"

  # 🇰🇷 Korea: 自动筛选韩国地区的节点
  - name: 🇰🇷 Korea
    type: select
    use:
      - all-proxies
    filter: "(?i)韩|KR|Korea"

  # 🇬🇧 United Kingdom: 自动筛选英国地区的节点
  - name: 🇬🇧 United Kingdom
    type: select
    use:
      - all-proxies
    filter: "(?i)英|UK|United Kingdom"

  # 🇩🇪 Germany: 自动筛选德国地区的节点
  - name: 🇩🇪 Germany
    type: select
    use:
      - all-proxies
    filter: "(?i)德|DE|Germany"

  # 🇫🇷 France: 自动筛选法国地区的节点
  - name: 🇫🇷 France
    type: select
    use:
      - all-proxies
    filter: "(?i)法|FR|France"

  # 🌍 Other Regions: 自动筛选主要地区以外的所有节点
  - name: 🌍 Other Regions
    type: select
    use:
      - all-proxies
    filter: "(?i)^(?!.*(港|HK|Hong Kong|日|JP|Japan|美|US|United States|Balance|新|SG|Singapore|台|TW|Taiwan|韩|KR|Korea|英|UK|United Kingdom|德|DE|Germany|法|FR|France)).*$"

  # 🌐 国际流量: 处理未命中的国际网站流量
  - name: 🌐 国际流量
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🚀 手动切换
      - 🇭🇰 Hong Kong
      - 🇯🇵 Japan
      - 🇺🇸 United States
      - 🇸🇬 Singapore
      - 🇹🇼 Taiwan
      - 🇰🇷 Korea
      - 🇬🇧 United Kingdom
      - 🇩🇪 Germany
      - 🇫🇷 France
      - 🌍 Other Regions

  

  # 🎯 国内流量: 处理已知国内网站的直连或代理策略
  - name: 🎯 国内流量
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择

  # 🚫 国内广告: 拦截国内应用内的广告
  - name: 🚫 国内广告
    type: select
    proxies:
      - REJECT
      - DIRECT
      - 🚀 节点选择

  # 🚫 国外广告: 拦截国外应用或网页广告
  - name: 🚫 国外广告
    type: select
    proxies:
      - REJECT
